version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: natalfy-postgres
    restart: always
    environment:
      POSTGRES_DB: natalfy_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: natalfy-redis
    restart: always
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: natalfy-api
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/natalfy_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=123
      - SPRING_JPA_HIBERNATE_DDL_AUTO=validate
      - SPRING_FLYWAY_ENABLED=true
      - SPRING_DATA_REDIS_HOST=redis
    depends_on:
      - db
      - redis

volumes:
  postgres_data: