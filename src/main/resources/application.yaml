spring:
  application:
    name: natalfy

  threads:
    virtual:
      enabled: true

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/natalfy}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # 👇 Mudamos de "update" para "validate". Agora ele só VÊ se está certo.
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # 👇 Ligamos o Flyway
  flyway:
    enabled: true
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379

  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY}
        chat:
          options:
            model: gemini-1.5-pro
            temperature: 0.3

# 🔐 Chave de Segurança para o JWT
app:
  jwt:
    secret: ${JWT_SECRET:ChaveSecretaMuitoLongaEComplexaParaONatalfy2026SegurancaLGPD}
    expiration-ms: 86400000 # 24 horaS